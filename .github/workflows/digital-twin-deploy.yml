# Deploy Week 2 Digital Twin (community contribution: erisanolasheni/twin).
# GitHub only loads workflows from the repository root .github/workflows/.
#
# Secrets: AWS_DEPLOY_ROLE_ARN, TF_STATE_BUCKET; optional TF_LOCK_TABLE.
# OIDC role trust must allow repo:erisanolasheni/production (this fork).
#
name: Deploy Digital Twin

on:
  push:
    branches: [main]
    paths:
      - "community_contributions/erisanolasheni/twin/**"
      - ".github/workflows/digital-twin-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: digital-twin-terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TWIN: community_contributions/erisanolasheni/twin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: community_contributions/erisanolasheni/twin/frontend/package-lock.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda package (Docker)
        working-directory: community_contributions/erisanolasheni/twin/backend
        run: python3 deploy.py

      - name: Write Terraform backend config
        working-directory: community_contributions/erisanolasheni/twin/terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
        run: |
          set -euo pipefail
          KEY="${TF_STATE_KEY:-twin/terraform.tfstate}"
          cat > backend.ci.hcl <<EOF
          bucket  = "${TF_STATE_BUCKET}"
          key     = "${KEY}"
          region  = "${AWS_REGION}"
          encrypt = true
          EOF
          if [ -n "${TF_LOCK_TABLE:-}" ]; then
            echo "dynamodb_table = \"${TF_LOCK_TABLE}\"" >> backend.ci.hcl
          fi

      - name: Terraform init
        working-directory: community_contributions/erisanolasheni/twin/terraform
        run: terraform init -input=false -backend-config=backend.ci.hcl

      - name: Select Terraform workspace
        working-directory: community_contributions/erisanolasheni/twin/terraform
        env:
          DEPLOY_ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT }}
        run: |
          set -euo pipefail
          E="${DEPLOY_ENVIRONMENT:-dev}"
          terraform workspace select "$E" 2>/dev/null || terraform workspace new "$E"

      - name: Terraform apply
        working-directory: community_contributions/erisanolasheni/twin/terraform
        env:
          DEPLOY_ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT }}
        run: |
          E="${DEPLOY_ENVIRONMENT:-dev}"
          terraform apply -input=false -auto-approve \
            -var="project_name=twin" \
            -var="environment=${E}"

      - name: Build frontend and sync to S3
        working-directory: community_contributions/erisanolasheni/twin
        run: |
          set -euo pipefail
          API_URL="$(terraform -chdir=terraform output -raw api_gateway_url)"
          BUCKET="$(terraform -chdir=terraform output -raw s3_frontend_bucket)"
          DIST_ID="$(terraform -chdir=terraform output -raw cloudfront_distribution_id)"
          cd frontend
          echo "NEXT_PUBLIC_API_URL=${API_URL}" > .env.production
          npm ci
          npm run build
          aws s3 sync ./out "s3://${BUCKET}/" --delete --region "${AWS_REGION}"
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*" \
            --region "${AWS_REGION}"

      - name: Show URLs
        working-directory: community_contributions/erisanolasheni/twin
        run: |
          echo "CloudFront: $(terraform -chdir=terraform output -raw cloudfront_url)"
          echo "API:        $(terraform -chdir=terraform output -raw api_gateway_url)"
